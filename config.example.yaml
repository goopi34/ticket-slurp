# slack-tickets configuration example
# Copy to slack-tickets.yaml and fill in your values.

slack:
  # xoxc and xoxd tokens from your Slack desktop client.
  # Extract them from the Slack app's local storage or network requests.
  xoxc: "xoxc-..."
  xoxd: "xoxd-..."
  # Optional: filter to a specific Slack user ID (leave empty to use the authenticated user)
  user_id: ""

timeframe:
  # Option A: explicit date range (YYYY-MM-DD, inclusive)
  start: "2026-03-27"
  end: "2026-04-03"
  # Option B: relative range (uncomment and remove start/end above)
  # last_days: 7

channels:
  # Whitelist: if non-empty, ONLY these channel IDs are analysed.
  whitelist: []
  # Blacklist: these channel IDs are always excluded.
  blacklist: []

llm:
  # Provider: azure | openai | anthropic | ollama
  provider: "azure"
  # Model name (for openai/anthropic/ollama; for azure use deployment below)
  model: "gpt-4o"

  # Azure AI Foundry settings
  azure:
    endpoint: "https://<resource>.openai.azure.com/"
    api_key: "${AZURE_OPENAI_API_KEY}"
    deployment: "gpt-4o"

  # OpenAI settings (used when provider: openai)
  openai:
    api_key: "${OPENAI_API_KEY}"

  # Anthropic settings (used when provider: anthropic)
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"

  # Ollama settings (used when provider: ollama)
  ollama:
    endpoint: "http://localhost:11434"

atlassian:
  # URL of the mcp-atlassian server (e.g. running via Docker)
  mcp_url: "http://localhost:3000"
  # Jira project key to search within
  project_key: "ENG"

output:
  # Report format: markdown (default) | json
  format: "markdown"
