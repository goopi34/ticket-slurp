version: 2

project_name: ticket-slurp

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: ticket-slurp
    main: ./cmd/ticket-slurp/
    binary: ticket-slurp

    # Inject version info at build time via ldflags.
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

    env:
      - CGO_ENABLED=0

    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64

    # Windows ARM64 is still uncommon in production; skip it.
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - ticket-slurp

    # tar.gz for Unix platforms, zip for Windows.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

    # Include the example config alongside the binary.
    files:
      - config.example.yaml
      - docker/atlassian-mcp/.env.example

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  # Version string used when running `goreleaser release --snapshot`.
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

release:
  # Draft the GitHub release so you can review before publishing.
  draft: false
  prerelease: auto
